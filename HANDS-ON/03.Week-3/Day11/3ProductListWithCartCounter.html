<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product List with Add to Cart Counter</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    max-width: 500px;
    margin: 40px auto;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
  }

  h1 span {
    color: #007bff;
  }

  .product {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .product p {
    margin: 0;
    font-weight: 500;
  }

  .addBtn {
    padding: 6px 12px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }


  .addBtn:disabled {
    background-color: gray;
    cursor: not-allowed;
  }

  .addedMsg {
    margin-left: 10px;
    color: green;
    font-size: 14px;
  }
</style>
</head>

<body>

<h1>Cart List: <span id="count">0</span></h1>

<div class="product">
  <p>Wireless Headphones - $59.99</p>
  <div>
    <button class="addBtn">Add to Cart</button>
  </div>
</div>

<div class="product">
  <p>Smart Watch - $89.99</p>
  <div>
    <button class="addBtn">Add to Cart</button>
  </div>
</div>

<div class="product">
  <p>Bluetooth Speaker - $39.99</p>
  <div>
    <button class="addBtn">Add to Cart</button>
  </div>
</div>

<div class="product">
  <p>Gaming Mouse - $29.99</p>
  <div>
    <button class="addBtn">Add to Cart</button>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(function(){
  let count = 0;

  $(".addBtn").on("click", function(){
    count++;
    $("#count").text(count);

    $(this).prop("disabled", true);
    $(this).after("<span class='addedMsg'>Added!</span>");
  });
});
</script>

</body>
</html>
