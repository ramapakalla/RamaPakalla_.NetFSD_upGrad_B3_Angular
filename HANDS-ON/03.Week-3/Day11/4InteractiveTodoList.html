<!doctype html>
<html>
<head>
  <title>To-Do List</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 40px auto;
    }

    input {
      padding: 6px;
      width: 60%;
    }

    button {
     padding: 6px 12px;
      cursor: pointer;
     padding: 6px 12px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      padding: 8px;
      margin-bottom: 6px;
      background: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .taskText {
      flex: 1;
      margin-left: 8px;
    }

    .completed .taskText {
      text-decoration: line-through;
      color: gray;
    }

    .delBtn {
      background: red;
      color: white;
      border: none;
      margin-left: 8px;
    }
  </style>
</head>
<body>

<h2>To-Do List</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<button id="addTask">Add</button>

<ul id="taskList"></ul>

<p>
  Total: <span id="totalCount">0</span> |
  Completed: <span id="completedCount">0</span>
</p>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(function () {
 
  //updating count
  function updateCounts() {
    $("#totalCount").text($("#taskList li").length);
    $("#completedCount").text($("#taskList li.completed").length);
  }
 
  //input
  $("#addTask").on("click", function () {
    let task = $("#taskInput").val().trim();
    if (task === "") {
        alert("Please enter any task!")
        return;
    }

    //creating elements
    let $li = $("<li>");
    let $checkbox = $("<input type='checkbox'>");
    let $text = $("<span>").addClass("taskText").text(task);
    let $del = $("<button>").addClass("delBtn").text("Delete");

    //appending
    $li.append($checkbox).append($text).append($del);
    $("#taskList").append($li);

    $("#taskInput").val("");
    updateCounts();
  });

 //To mark as completed
  $("#taskList").on("change", "input[type='checkbox']", function () {
    $(this).parent().toggleClass("completed");
    updateCounts();
  });

 // to delete the task
  $("#taskList").on("click", ".delBtn", function () {
    $(this).parent().remove();
    updateCounts();
  });

});
</script>

</body>
</html>
