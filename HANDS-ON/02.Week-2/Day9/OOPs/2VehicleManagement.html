<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vehicle Management System</title>
  </head>
  <body>
    <h1>Vehicle Management System</h1>
    <p id="vehicleDetails"></p>

    <script>
      class Vehicle {
        constructor(brand, speed) {
          this.brand = brand;
          this.speed = speed;
        }

        displayInfo() {
          return `Brand: ${this.brand} <br/>
                  Speed: ${this.speed} km/h`;
        }
      }

      class Car extends Vehicle {
        constructor(brand, speed, fuelType) {
          super(brand, speed);
          this.fuelType = fuelType;
        }

        showCarDetails() {
          return `Brand: ${this.brand} <br/>
                  Speed: ${this.speed} km/h <br/>
                  Fuel Type: ${this.fuelType}`;
        }
      }

      // Create one Car object
      let car = new Car("Kia", 110, "Petrol");

      // Call both parent and child methods
      document.getElementById("vehicleDetails").innerHTML =
        "<strong>Parent Method:</strong> <br/>" +
        car.displayInfo() +
        "<br/><br/><strong>Child Method:</strong><br/>" +
        car.showCarDetails();
    </script>
  </body>
</html>
