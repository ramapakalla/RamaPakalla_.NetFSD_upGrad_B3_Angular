<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Data Fetcher</title>
  </head>
  <body>
    <h2>Weather Data Fetcher</h2>
    <label>City: </label>
    <input type="text" id="city" placeholder="Enter the city" />
    <br />
    <button onclick="getWeatherWithPromise()">Promise</button>
    <button onclick="getWeatherWithAsync()">Async/Await</button>
    <p id="output"></p>
    <script>
  const cityObj = document.getElementById("city");
  const output = document.getElementById("output");

  //For formatting 
  const formatWeather = (name, country, temperature) => `
      Weather Report:
      City: ${name}, ${country}
      Temperature: ${temperature} °C
  `;

  //using promise
  function getWeatherWithPromise() {

    const city = cityObj.value.trim();

    if (!city) {
      output.innerHTML = "Please enter city!";
      return;
    }

    const geoUrl =
      `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`;

    fetch(geoUrl)
      .then(res => {
        if (!res.ok) {
          throw new Error("Failed to fetch location");
        }
        return res.json();
      })
      .then(geoData => {

        if (!geoData.results || geoData.results.length === 0) {
          throw new Error("City not found");
        }

        const { latitude, longitude, name, country } =
          geoData.results[0];

        const weatherUrl =
          `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m`;

        return fetch(weatherUrl)
          .then(res => {
            if (!res.ok) {
              throw new Error("Failed to fetch weather");
            }
            return res.json();
          })
          .then(weatherData => {
            return {
              name,
              country,
              temperature: weatherData.current.temperature_2m
            };
          });

      })
      .then(result => {
        output.innerHTML = formatWeather(
          result.name,
          result.country,
          result.temperature
        );
      })
      .catch(error => {
        output.innerHTML = `Error: ${error.message}`;
      });
  }

  //using async
  async function getWeatherWithAsync() {

    try {

      const city = cityObj.value.trim();

      if (!city) {
        throw new Error("Please enter city!");
      }

      const geoUrl =
        `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`;

      const res1 = await fetch(geoUrl);

      if (!res1.ok) {
        throw new Error("Failed to fetch location");
      }

      const geoData = await res1.json();

      if (!geoData.results || geoData.results.length === 0) {
        throw new Error("City not found");
      }

      const { latitude, longitude, name, country } =
        geoData.results[0];

      const weatherUrl =
        `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m`;

      const res2 = await fetch(weatherUrl);

      if (!res2.ok) {
        throw new Error("Failed to fetch weather");
      }

      const weatherData = await res2.json();

      output.innerHTML = formatWeather(
        name,
        country,
        weatherData.current.temperature_2m
      );

    }
    catch (error) {
      output.innerHTML = `Error: ${error.message}`;
    }
  }
</script>
  </body>
</html>
