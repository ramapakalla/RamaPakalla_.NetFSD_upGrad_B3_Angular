<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Expense Tracker</title>
</head>
<body>
    <h1>Mini Expense Tracker</h1>
    <label for="expenseInput">Enter your expense:</label>
    <input type="text" id="expenseInput" />
    <br><br>

    <label for="amountInput">Enter amount:</label>
    <input type="number" id="amountInput" />
    <br><br>
    
    <label for="dateInput">Enter date:</label>
    <input type="date" id="dateInput" />
    <br><br>
    <button type="button" onclick="openDB()">Open Database</button>
    <button type="button" onclick="addExpense()">Add Expense</button>
    <button type="button" onclick="viewExpenses()">View Expenses</button>
    <button type="button" onclick="clearExpenses()">Delete Expenses</button>

    <h3>Expenses List</h3>
    <ul id="expensesList"></ul>


    <script>
        let db;

        function openDB() {
            let request = indexedDB.open("ExpenseDB",1);

            request.onupgradeneeded = function(event) {
                db = event.target.result;
                let objectStore = db.createObjectStore("expenses", {
                    keyPath : "id",
                    autoIncrement: true
                });

                objectStore.createIndex("expenses","expenses",{unique:false});
                objectStore.createIndex("amount","amount",{unique:false});
                objectStore.createIndex("date","date",{unique:false});
            };
        request.onsuccess = function(event) {
            db = event.target.result;
            alert("Database opened successfully");
        };
        request.onerror = function(event){
            alert("Error opening database: " + event.target.errorCode);
         };
        

        }

        // Create (insert) operation
    function addExpense() {
        let expense = document.getElementById("expenseInput").value;
        let amount = document.getElementById("amountInput").value;
        let date = document.getElementById("dateInput").value;

        let transaction = db.transaction("expenses", "readwrite");
        let objectStore = transaction.objectStore("expenses");
        let expenseData = {
            expense: expense,
            amount: amount,
            date: date
        };
        objectStore.add(expenseData);

        transaction.oncomplete = function() {
            alert("Expense added successfully");
            viewExpenses();
        };
    
    }

    //Read (Select)

    function viewExpenses(){
        let list = document.getElementById("expensesList");
        list.innerHTML = "";

        let transaction = db.transaction("expenses","readonly");
        let objectStore = transaction.objectStore("expenses");

        objectStore.openCursor().onsuccess = function(event){
            let cursor = event.target.result;

            if(cursor){
                let li = document.createElement("li");
                li.textContent = 
                "ID: " + cursor.value.id +
                " | Expense: " + cursor.value.expense +
                " | Amount: " + cursor.value.amount + 
                " | Date: " + cursor.value.date;
            list.appendChild(li);
            cursor.continue();
            }
        };
    }

    //Update 
    function updateExpense(){
        let id = parseInt(prompt("Enter the ID of the expense to update:"));
        let expense = document.getElementById("expenseInput").value;
        let amount = document.getElementById("amountInput").value;
        let date = document.getElementById("dateInput").value;

        let transaction = db.transaction("expenses", "readwrite");
        let objectStore = transaction.objectStore("expenses");

        let request = objectStore.get(Number(id));

        request.onsuccess = function(event){
            let data = request.result;

            if(!data){
                alert("Expense with ID " + id + " not found.");
                return;
            }
            else{
            data.expense = expense;
            data.amount = amount;
            data.date = date;

            objectStore.put(data);
            alert("Expense updated successfully");
            viewExpenses();
            }
        };
    }

    function clearExpenses(){
        let id = parseInt(prompt("Enter the ID of the expense to delete:"));
        let transaction = db.transaction("expenses", "readwrite");

        let objectStore = transaction.objectStore("expenses");
        objectStore.delete(id);

        transaction.oncomplete = function() {
            alert("Expense deleted successfully");
            viewExpenses();
        };
    }

    </script>
</body>
</html>
